<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>File Expired - QR File Share</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center;
            align-items: center; height: 100vh; margin: 0;
            background: #1a1a2e; color: #eee; }
        .card { background: #16213e; padding: 40px; border-radius: 12px;
            width: 360px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        h2 { color: #e94560; }
        p { color: #a0a0b0; }
        span.icon { font-size: 64px; display: block; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="card">
    <span class="icon">⏰</span>
    <h2>Link Expired</h2>
    <p th:text="${message}">This file has expired and is no longer available.</p>
</div>
</body>
</html>
